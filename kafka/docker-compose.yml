services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # Уникальный номер этого брокера в кластере — нужен чтобы узлы различали друг друга
      KAFKA_NODE_ID: 1

      # Этот узел одновременно хранит данные (broker) и управляет кластером (controller)
      # Раньше управлением занимался отдельный сервис Zookeeper — теперь это встроено в Kafka (KRaft)
      KAFKA_PROCESS_ROLES: broker,controller

      # Список узлов, участвующих в выборах контроллера. Формат: nodeId@хост:порт
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # На каких портах Kafka принимает соединения
      # INTERNAL:29092 — для контейнеров внутри Docker (kafka-ui)
      # EXTERNAL:9092  — для программ на хосте (Camunda c8run)
      # CONTROLLER:9093 — только для внутреннего управления, снаружи не используется
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

      # Kafka сидит в Docker и не знает, как её видит внешний мир.
      # Эти адреса она отдаёт клиенту после первого подключения — "ходи сюда дальше".
      # INTERNAL → kafka:29092  — docker-контейнеры резолвят имя "kafka" через Docker DNS
      # EXTERNAL → localhost:9092 — Camunda на хосте видит это как свой localhost
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092

      # Без шифрования и паролей — нормально для локальной разработки
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      # Говорим Kafka какой из listener'ов используется контроллером KRaft для служебных сообщений
      # Должно совпадать с именем из KAFKA_LISTENERS — у нас это CONTROLLER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Через какой listener брокеры общаются между собой (репликация, координация)
      # У нас один брокер, но параметр обязателен — указываем INTERNAL (Docker-сеть)
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # Kafka создаёт топик автоматически при первой записи — не нужно создавать руками
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Kafka хранит позиции чтения consumer'ов в служебном топике __consumer_offsets
      # Нужно явно указать 1, иначе Kafka ждёт несколько брокеров и выдаёт ошибку при старте
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      # То же самое для служебного топика транзакций
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      # Минимум брокеров, которые должны подтвердить запись транзакции — у нас один
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # По умолчанию Kafka ждёт 3 сек перед стартом consumer-группы — вдруг ещё кто подключится
      # 0 = не ждать, Camunda Kafka connector стартует быстрее
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # Максимальный размер одного сообщения, дефолт 1 МБ — режет большие JSON-переменные Camunda
      KAFKA_MESSAGE_MAX_BYTES: 10485760

      # Сообщения хранятся 24 часа, потом удаляются
      KAFKA_LOG_RETENTION_HOURS: 24

      # Уникальный ID кластера, нужен для инициализации KRaft при первом запуске
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: schema-registry
    ports:
      # Schema Registry доступен на http://localhost:8082 — REST API для управления схемами
      - "8082:8081"
    environment:
      # Имя хоста, под которым Schema Registry регистрирует себя внутри Docker-сети
      SCHEMA_REGISTRY_HOST_NAME: schema-registry

      # Адрес Kafka, куда Schema Registry подключается для хранения схем
      # Схемы хранятся в служебном топике Kafka _schemas — не в отдельной БД
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

      # На каком адресе Schema Registry принимает REST-запросы
      # Через этот адрес producer/consumer регистрируют и получают схемы
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      # Имя кластера — только для отображения в интерфейсе
      KAFKA_CLUSTERS_0_NAME: local

      # kafka-ui живёт внутри Docker, поэтому подключается через внутренний listener
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

      # Подключаем Schema Registry — kafka-ui будет показывать схемы и десериализовывать Avro-сообщения
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    restart: unless-stopped

volumes:
  kafka-data:
