services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Controller перенесён на 9094 (не публикуется), чтобы освободить 9093 для SSL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094

      # INTERNAL:29092  — docker-контейнеры (Schema Registry, kafka-ui)
      # EXTERNAL:9092   — PLAINTEXT для инструментов без SSL
      # SSL:9093        — TLS/mTLS для Camunda и внешних клиентов
      # CONTROLLER:9094 — только KRaft, не публикуется наружу
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,SSL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${KAFKA_HOST:-localhost}:9092,SSL://${KAFKA_HOST:-localhost}:9093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,SSL:SSL,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # SSL — certs монтированы в /etc/kafka/secrets (KAFKA_SECRETS_DIR по умолчанию)
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.broker.keystore.p12
      KAFKA_SSL_KEYSTORE_TYPE: PKCS12
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: keystore_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.broker.truststore.p12
      KAFKA_SSL_TRUSTSTORE_TYPE: PKCS12
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: truststore_creds
      # required = mTLS: клиент обязан предъявить сертификат
      KAFKA_SSL_CLIENT_AUTH: required
      # Отключить проверку hostname (self-signed cert по IP, без DNS)
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_LOG_RETENTION_HOURS: 24
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    volumes:
      - kafka-data:/var/lib/kafka/data
      - ${KAFKA_SSL_DIR:-./kafka-ssl}:/etc/kafka/secrets:ro

    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: schema-registry
    ports:
      # Schema Registry доступен на http://localhost:8082 — REST API для управления схемами
      - "8082:8081"
    environment:
      # Имя хоста, под которым Schema Registry регистрирует себя внутри Docker-сети
      SCHEMA_REGISTRY_HOST_NAME: schema-registry

      # Адрес Kafka, куда Schema Registry подключается для хранения схем
      # Схемы хранятся в служебном топике Kafka _schemas — не в отдельной БД
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

      # На каком адресе Schema Registry принимает REST-запросы
      # Через этот адрес producer/consumer регистрируют и получают схемы
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      # Имя кластера — только для отображения в интерфейсе
      KAFKA_CLUSTERS_0_NAME: local

      # kafka-ui живёт внутри Docker, поэтому подключается через внутренний listener
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

      # Подключаем Schema Registry — kafka-ui будет показывать схемы и десериализовывать Avro-сообщения
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
    restart: unless-stopped

volumes:
  kafka-data:
